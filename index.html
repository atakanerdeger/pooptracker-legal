<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PoopTracker — Legal</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f9; color: #1a1c1c; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; }
  .card { background: #fff; border-radius: 24px; padding: 40px 36px; max-width: 420px; width: 100%; box-shadow: 0 4px 32px rgba(0,104,93,.08); border: 0.5px solid rgba(188,201,197,.3); text-align: center; }
  .emoji { font-size: 48px; margin-bottom: 16px; }
  h1 { font-size: 22px; font-weight: 800; color: #00685d; margin-bottom: 4px; letter-spacing: -.03em; }
  .subtitle { font-size: 13px; color: #6d7a77; margin-bottom: 32px; }
  .section-title { font-size: 11px; font-weight: 700; color: #6d7a77; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px; text-align: left; }
  .links { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .link-btn { display: flex; align-items: center; gap: 12px; background: #e6f4f1; border-radius: 14px; padding: 14px 16px; text-decoration: none; transition: background .2s; }
  .link-btn:hover { background: #d0ece7; }
  .link-icon { width: 36px; height: 36px; border-radius: 10px; background: #00685d; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; }
  .link-text { text-align: left; }
  .link-title { font-size: 14px; font-weight: 600; color: #00685d; display: block; }
  .link-sub { font-size: 11px; color: #6d7a77; display: block; margin-top: 1px; }
  .arrow { margin-left: auto; font-size: 16px; color: #00685d; opacity: .5; }
  .footer { font-size: 11px; color: #9aada9; margin-top: 24px; }
</style>
</head>
<body>
  <div class="card">
    <div class="emoji">💩</div>
    <h1>PoopTracker</h1>
    <p class="subtitle">Gut Health AI Analysis — Legal Documents</p>

    <div class="section-title">English</div>
    <div class="links">
      <a href="privacy-policy.html" class="link-btn">
        <div class="link-icon">🔒</div>
        <div class="link-text">
          <span class="link-title">Privacy Policy</span>
          <span class="link-sub">How we handle your data</span>
        </div>
        <span class="arrow">›</span>
      </a>
      <a href="terms-of-service.html" class="link-btn">
        <div class="link-icon">📋</div>
        <div class="link-text">
          <span class="link-title">Terms of Service</span>
          <span class="link-sub">Rules and conditions of use</span>
        </div>
        <span class="arrow">›</span>
      </a>
    </div>

    <p class="footer">© 2025 PoopTracker. All rights reserved.</p>
  </div>
</body>
</html>
